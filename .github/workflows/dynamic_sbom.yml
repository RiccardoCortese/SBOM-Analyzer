name: Dynamic Dependencies SBOM Analyzer

on:
  workflow_dispatch:
    inputs:
      src_repository:
        description: 'Repository target da clonare (owner/repo)'
        required: true
      src_branch:
        description: 'Branch della repo target'
        required: true
        default: 'main'
      path_dipendenze:
        description: 'Path del file delle dipendenze'
        required: true
        default: 'dependencies.json'

jobs:
  # --- JOB 1: ESTRAZIONE MATRICE ---
  parse-dependencies:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.src_repository }}
          ref: ${{ github.event.inputs.src_branch }}

      - name: Parse JSON to Matrix
        id: set-matrix
        run: |
          # Carica tutto il file JSON in una matrice
          MATRIX=$(cat ${{ github.event.inputs.path_dipendenze }} | jq -c '.')
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  # --- JOB 2: ANALISI IN PARALLELO ---
  trivy-analysis:
    needs: parse-dependencies
    runs-on: ubuntu-latest
    strategy:
      matrix:
        item: ${{ fromJson(needs.parse-dependencies.outputs.matrix) }}
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      - name: Setup and Build Environment
        id: setup
        run: |
          TYPE=$(echo '${{ toJson(matrix.item) }}' | jq -r '.type')
          URL=$(echo '${{ toJson(matrix.item) }}' | jq -r '.url // ""')
          # Creazione di un nome file pulito per lo script Python
          CLEAN_NAME=$(echo "$URL" | sed 's|https://||; s|http://||; s|/|-|g; s|\.||g' | cut -c 1-50)
          [ -z "$CLEAN_NAME" ] && CLEAN_NAME="$TYPE-dependency"
          echo "clean_name=$CLEAN_NAME" >> $GITHUB_OUTPUT

          # Esecuzione setup basata sul tipo (come definito nel tuo JSON)
          case $TYPE in
            "git") git clone --depth 1 $URL target_repo ;;
            "git-checkout") cd $(echo '${{ toJson(matrix.item) }}' | jq -r '.path') && git checkout $(echo '${{ toJson(matrix.item) }}' | jq -r '.cmd') ;;
            "apt") sudo apt-get install -y $URL ;;
            "pip") pip install $URL ;;
            *) echo "Skipping setup for $TYPE" ;;
          esac

      - name: Install Trivy
        run: |
          sudo apt-get update && sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Generate CycloneDX SBOM
        run: |
          trivy fs --format cyclonedx --output "${{ steps.setup.outputs.clean_name }}-sbom.json" .

      - name: Upload Temporary Individual Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmp-sbom-${{ steps.setup.outputs.clean_name }}
          path: '${{ steps.setup.outputs.clean_name }}-sbom.json'
          retention-days: 1

  # --- JOB 3: UNIFICAZIONE FINALE ---
  merge-sboms:
    needs: [parse-dependencies, trivy-analysis]
    runs-on: ubuntu-latest
    steps:
      - name: Create Workspace Directory
        run: mkdir -p combined-results

      - name: Download All Temporary Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tmp-sbom-*
          path: combined-results
          merge-multiple: true

      - name: Upload Consolidated Artifact to Backend
        uses: actions/upload-artifact@v4
        with:
          name: sbom-matrix-results
          path: combined-results/*.json
          retention-days: 1